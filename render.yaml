services:
  - type: web
    name: sns-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_http:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: SNS_CORS_ORIGINS
        value: "https://sns-web-um3d.onrender.com,https://stockandstir.co,https://www.stockandstir.co,https://getstockandstir.co,https://www.getstockandstir.co"
      - key: OPENAI_API_KEY
        sync: false
      - key: SNS_PANTRY_VISION_MODEL
        value: gpt-5-mini
