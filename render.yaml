services:
  - type: web
    name: sns-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api_http:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: SNS_CORS_ORIGINS
        value: "https://sns-web-um3d.onrender.com"
