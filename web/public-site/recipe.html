<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Your Meal · Stock & Stir</title>
  <link rel="stylesheet" href="sns-flow.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">Stock <span>&amp;</span> Stir</div>
    <a class="header-link" href="my-kitchen.html">Back to My Kitchen</a>
  </header>
  <main>
    <section class="hero">
      <div>
        <div class="eyebrow">Phase 3 · Cook</div>
        <h1 data-recipe-title>Your recipe</h1>
        <p class="lede" data-recipe-summary></p>
      </div>
      <aside class="status-card">
        <strong data-recipe-time>Flexible timing</strong>
        A calm plan built from My Kitchen.
      </aside>
    </section>
    <div class="recipe-shell">
      <aside class="recipe-aside">
        <h2>Ingredients</h2>
        <ul data-ingredients></ul>
      </aside>
      <section class="recipe-main">
        <h2>Cooking plan</h2>
        <div class="cooking-plan-list" data-steps></div>
      </section>
    </div>
  </main>
  <script src="sns-flow.js"></script>
</body>
</html>
